name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 0.1.0"
        required: true
      publish_to_nuget:
        description: "Push the generated package to NuGet"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_KAFKA_ADAPTER_SKIP_TLS_TESTS: true
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              $version = "${{ github.event.inputs.version }}"
          }
          else {
              $version = "${{ github.ref_name }}"
              if ($version.StartsWith("v")) {
                  $version = $version.Substring(1)
              }
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
              throw "Could not determine release version."
          }

          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore DotNetKafkaAdapter.sln

      - name: Start plaintext Kafka
        run: docker compose -f docker-compose.kafka.yml up -d

      - name: Build
        run: dotnet build DotNetKafkaAdapter.sln --configuration Release --no-restore

      - name: Run integration tests
        run: dotnet test tests/DotNetKafkaAdapter.IntegrationTests/DotNetKafkaAdapter.IntegrationTests.csproj --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack src/DotNetKafkaAdapter/DotNetKafkaAdapter.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          /p:Version=${{ steps.version.outputs.package_version }}
          /p:ContinuousIntegrationBuild=true
          /p:IncludeSymbols=true
          /p:SymbolPackageFormat=snupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DotNetKafkaAdapter-${{ steps.version.outputs.package_version }}
          path: artifacts/packages/*

      - name: Push package to NuGet
        if: >
          (github.event_name == 'push' || github.event.inputs.publish_to_nuget == 'true')
          && env.NUGET_API_KEY != ''
        run: >
          dotnet nuget push artifacts/packages/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key $NUGET_API_KEY
          --skip-duplicate

      - name: Push symbol package to NuGet
        if: >
          (github.event_name == 'push' || github.event.inputs.publish_to_nuget == 'true')
          && env.NUGET_API_KEY != ''
        run: >
          dotnet nuget push artifacts/packages/*.snupkg
          --source https://api.nuget.org/v3/index.json
          --api-key $NUGET_API_KEY
          --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.package_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

      - name: Stop Kafka stacks
        if: always()
        run: |
          docker compose -f docker-compose.kafka.yml down -v
